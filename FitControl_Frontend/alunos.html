      <a href="relatorios.html"><i class='bx bxs-bar-chart-alt-2'></i> RelatÃ³rios</a>
     
    </nav>
  </aside>

  <main class="main">
    <header class="header">
      <div class="header-left">
        <button class="menu-btn" id="openMenu">
          <i class='bx bx-menu'></i>
        </button>
        <h1>Cadastro de Alunos</h1>
      </div>
    </header>

    <section class="table-section">
      <h2>Novo Aluno</h2>

      <form id="formAluno" class="form-aluno">
        <div class="form-grid">
          <input type="text" id="nome" placeholder="Nome do aluno" required>
          <input type="text" id="cpf" placeholder="CPF" required>
          <input type="email" id="email" placeholder="E-mail" required>
          <input type="text" id="telefone" placeholder="Telefone" required>
          <input type="date" id="dataNascimento" title="Data de nascimento" required>
          <input type="text" id="endereco" placeholder="EndereÃ§o" required>
        </div>

        <button type="submit" class="btn-submit">Cadastrar Aluno</button>
      </form>
    </section>

    <section class="table-section" style="margin-top: 20px;">
      <h2>Alunos Cadastrados</h2>
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Nome</th>
              <th>E-mail</th>
              <th>Telefone</th>
              <th>CPF</th>
            </tr>
          </thead>
          <tbody id="listaAlunos"></tbody>
        </table>
      </div>
    </section>
  </main>


  <div vw class="enabled">
  <div vw-access-button class="active"></div>
  <div vw-plugin-wrapper>
