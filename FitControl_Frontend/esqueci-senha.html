<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Esqueci a Senha - FitControl</title>
    <link rel="stylesheet" href="css/login.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>
<body>

    <div class="container">
        <h1>Recuperar Senha</h1>

        <p class="subtitle">
            Informe seu e-mail cadastrado para recuperar sua senha.
        </p>

        <form id="formEsqueciSenha">
            <div class="input-box">
                <input type="email" id="emailRecuperacao" placeholder="Digite seu e-mail" required>
                <i class='bx bx-envelope'></i>
            </div>

            <button type="submit" class="login">Recuperar Senha</button>
        </form>

        <div class="register-link">
            <p>Lembrou sua senha? <a href="index.html">Voltar ao login</a></p>
        </div>
    </div>

    <script src="js/esqueci-senha.js"></script>
</body>
</html>
